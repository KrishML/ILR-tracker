<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal ILR Risk Tracker</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f4f6f8; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { color: #1a365d; margin-top: 0; }
        .dashboard { display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
        .card { flex: 1; min-width: 200px; background: #edf2f7; padding: 20px; border-radius: 8px; text-align: center; }
        .card h3 { margin: 0 0 10px 0; color: #4a5568; font-size: 14px; text-transform: uppercase; }
        .card .value { font-size: 32px; font-weight: bold; color: #2b6cb0; }
        .danger-text { color: #e53e3e !important; }
        .controls { background: #fff; border: 1px solid #e2e8f0; padding: 20px; border-radius: 8px; margin-bottom: 30px; }
        .control-group { margin-bottom: 20px; }
        .control-group:last-child { margin-bottom: 0; }
        label { display: flex; justify-content: space-between; font-weight: 600; margin-bottom: 10px; font-size: 16px; }
        input[type=range] { width: 100%; cursor: pointer; height: 8px; accent-color: #2b6cb0; }
        .chart-container { position: relative; height: 450px; width: 100%; border: 1px solid #e2e8f0; border-radius: 8px; padding: 10px; background: #fafafa; }
        #error-log { color: red; font-weight: bold; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🇬🇧 UK ILR Absence Tracker</h1>
    <div id="error-log"></div>
    
    <div class="dashboard">
        <div class="card">
            <h3>UKVI Limit</h3>
            <div class="value">180 Days</div>
        </div>
        <div class="card">
            <h3>Max Rolling Peak</h3>
            <div class="value" id="peakValue">0 Days</div>
        </div>
        <div class="card">
            <h3>Status</h3>
            <div class="value" id="statusText" style="font-size: 24px;">Safe</div>
        </div>
    </div>

    <div class="controls">
        <div class="control-group">
            <label><span>Extra 2026 Travel Days (Starts May 11, 2026)</span> <span id="val2026">20 Days</span></label>
            <input type="range" id="slider2026" min="0" max="100" value="20">
        </div>
        <div class="control-group">
            <label><span>2027 Travel Days (Starts Apr 25, 2027)</span> <span id="val2027">45 Days</span></label>
            <input type="range" id="slider2027" min="0" max="180" value="45">
        </div>
    </div>

    <div class="chart-container">
        <canvas id="ilrChart"></canvas>
    </div>
</div>

<script>
window.addEventListener('DOMContentLoaded', function() {
    try {
        // 1. Check if Chart.js loaded
        if (typeof Chart === 'undefined') {
            document.getElementById('error-log').innerText = "Error: Chart library failed to load. Please ensure your Mac is connected to the internet and not blocking scripts.";
            return;
        }

        // 2. Setup Data
        const startDate = new Date('2022-10-22T00:00:00');
        const endDate = new Date('2027-11-24T00:00:00');
        
        const baseTrips = [
            ['2022-10-22', '2022-11-23'], ['2022-11-29', '2022-12-10'], ['2023-01-28', '2023-02-05'],
            ['2023-03-06', '2023-03-11'], ['2023-05-11', '2023-05-29'], ['2023-06-16', '2023-06-19'],
            ['2023-07-08', '2023-07-11'], ['2023-08-03', '2023-08-07'], ['2023-08-18', '2023-08-21'],
            ['2023-09-01', '2023-09-05'], ['2023-09-14', '2023-09-16'], ['2023-10-06', '2023-10-09'],
            ['2023-10-13', '2023-10-29'], ['2023-11-11', '2023-11-15'], ['2024-01-12', '2024-01-14'],
            ['2024-01-21', '2024-01-23'], ['2024-01-31', '2024-02-07'], ['2024-03-19', '2024-04-08'],
            ['2024-07-26', '2024-07-28'], ['2024-08-16', '2024-08-18'], ['2024-08-29', '2024-09-02'],
            ['2024-09-28', '2024-10-01'], ['2024-11-08', '2024-11-11'], ['2024-11-29', '2024-12-09'],
            ['2024-12-20', '2024-12-30'], ['2025-01-09', '2025-01-27'], ['2025-02-07', '2025-02-10'],
            ['2025-03-01', '2025-03-03'], ['2025-03-06', '2025-03-16'], ['2025-04-16', '2025-04-22'],
            ['2025-05-02', '2025-05-06'], ['2025-05-31', '2025-06-04'], ['2025-06-13', '2025-06-16'],
            ['2025-06-27', '2025-07-06'], ['2025-07-13', '2025-07-21'], ['2025-07-30', '2025-08-04'],
            ['2025-08-11', '2025-08-17'], ['2025-08-22', '2025-08-25'], ['2025-09-04', '2025-09-09'],
            ['2025-09-11', '2025-09-16'], ['2025-11-07', '2025-11-10'], ['2025-11-21', '2025-11-24'],
            ['2025-12-02', '2025-12-29'], ['2026-01-16', '2026-01-19'], ['2026-01-23', '2026-01-26'],
            ['2026-02-05', '2026-02-18'], ['2026-02-20', '2026-02-23'], ['2026-03-06', '2026-03-09'],
            ['2026-03-14', '2026-03-16'], ['2026-03-28', '2026-03-30'], ['2026-04-01', '2026-04-07'],
            ['2026-04-10', '2026-04-13'], ['2026-04-17', '2026-04-20'], ['2026-05-01', '2026-05-10'],
            ['2026-11-21', '2026-12-31']
        ];

        // Generate timeline array
        const dateLabels = [];
        const timelineDates = [];
        let d = new Date(startDate);
        while (d <= endDate) {
            timelineDates.push(new Date(d));
            dateLabels.push(d.toLocaleDateString('en-GB', { month: 'short', year: 'numeric' }));
            d.setDate(d.getDate() + 1);
        }
        const totalDays = timelineDates.length;

        // Chart.js Setup
        const ctx = document.getElementById('ilrChart').getContext('2d');
        const ilrChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: dateLabels,
                datasets: [
                    {
                        label: 'Rolling 365-Day Absences',
                        data: Array(totalDays).fill(0),
                        borderColor: '#2b6cb0',
                        backgroundColor: 'rgba(43, 108, 176, 0.2)',
                        fill: true,
                        tension: 0.1,
                        pointRadius: 0
                    },
                    {
                        label: 'UKVI Limit (180)',
                        data: Array(totalDays).fill(180),
                        borderColor: '#e53e3e',
                        borderDash: [5, 5],
                        pointRadius: 0,
                        fill: false,
                        borderWidth: 2
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { beginAtZero: true, max: 200, title: { display: true, text: 'Days Absent in Past Year' } },
                    x: { ticks: { maxTicksLimit: 20 } }
                },
                interaction: { intersect: false, mode: 'index' },
                plugins: { tooltip: { enabled: true } },
                animation: { duration: 200 } // speeds up slider reaction
            }
        });

        // Main Calculation Logic
        function updateCalculations() {
            const extra2026 = parseInt(document.getElementById('slider2026').value) || 0;
            const extra2027 = parseInt(document.getElementById('slider2027').value) || 0;
            
            document.getElementById('val2026').innerText = extra2026 + " Days";
            document.getElementById('val2027').innerText = extra2027 + " Days";

            const dailyAbsences = new Array(totalDays).fill(0);

            // Apply Base Trips
            baseTrips.forEach(trip => {
                const start = new Date(trip[0] + 'T00:00:00');
                const end = new Date(trip[1] + 'T00:00:00');
                for (let i = 0; i < totalDays; i++) {
                    if (timelineDates[i] > start && timelineDates[i] < end) {
                        dailyAbsences[i] = 1;
                    }
                }
            });

            // Apply Extra 2026 (Starting May 11, 2026)
            const date2026 = new Date('2026-05-11T00:00:00');
            let applied2026 = 0;
            for (let i = 0; i < totalDays && applied2026 < extra2026; i++) {
                if (timelineDates[i] >= date2026) { dailyAbsences[i] = 1; applied2026++; }
            }

            // Apply 2027 (Starting April 25, 2027)
            const date2027 = new Date('2027-04-25T00:00:00');
            let applied2027 = 0;
            for (let i = 0; i < totalDays && applied2027 < extra2027; i++) {
                if (timelineDates[i] >= date2027) { dailyAbsences[i] = 1; applied2027++; }
            }

            // Calculate Rolling 365
            const rolling365 = new Array(totalDays).fill(0);
            let peak = 0;
            for (let i = 0; i < totalDays; i++) {
                let sum = 0;
                const startWindow = Math.max(0, i - 364);
                for (let j = startWindow; j <= i; j++) {
                    sum += dailyAbsences[j];
                }
                rolling365[i] = sum;
                if (sum > peak) peak = sum;
            }

            // Update Chart
            ilrChart.data.datasets[0].data = rolling365;
            ilrChart.update();

            // Update Dashboards
            const peakEl = document.getElementById('peakValue');
            const statusEl = document.getElementById('statusText');
            
            peakEl.innerText = peak + " Days";
            
            if (peak >= 180) {
                peakEl.className = "value danger-text";
                statusEl.innerText = "LIMIT EXCEEDED";
                statusEl.className = "value danger-text";
            } else if (peak >= 150) {
                peakEl.className = "value";
                statusEl.innerText = "Warning Zone";
                statusEl.style.color = "#dd6b20";
            } else {
                peakEl.className = "value";
                statusEl.innerText = "Safe";
                statusEl.style.color = "#38a169";
            }
        }

        // Attach event listeners for BOTH 'input' (dragging) and 'change' (clicking)
        const s2026 = document.getElementById('slider2026');
        const s2027 = document.getElementById('slider2027');
        
        s2026.addEventListener('input', updateCalculations);
        s2026.addEventListener('change', updateCalculations);
        s2027.addEventListener('input', updateCalculations);
        s2027.addEventListener('change', updateCalculations);

        // Run once on load
        updateCalculations();

    } catch (error) {
        document.getElementById('error-log').innerText = "App Error: " + error.message;
        console.error(error);
    }
});
</script>
</body>
</html>
